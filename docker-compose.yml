version: '3.8'

# ============================================================
# Proyecto Centurion – Docker Compose
# Services: postgres, backend (Express), frontend (Nginx SPA)
# ============================================================

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: centurion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       centurion
      POSTGRES_USER:     centurion
      POSTGRES_PASSWORD: centurion_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U centurion -d centurion"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js / Express) ────────────────────────────
  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    container_name: centurion_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:        production
      STELLAR_NETWORK: testnet
      DB_CLIENT:       pg
      DATABASE_URL:    postgresql://centurion:centurion_dev@postgres:5432/centurion
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Frontend (Vite build served via Nginx) ─────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile
    container_name: centurion_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://backend:3001/api
    depends_on:
      backend:
        condition: service_healthy

# ── Named volumes ─────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
