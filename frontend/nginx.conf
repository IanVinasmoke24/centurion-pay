# ============================================================
# Proyecto Centurion – Nginx Configuration
# SPA routing (fallback to index.html), gzip, static caching
# ============================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
    multi_accept       on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens      off;   # Hide Nginx version

    # ── Gzip compression ────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_min_length   256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject;

    # ── Main server block ────────────────────────────────────
    server {
        listen      3000;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Security headers ──────────────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"   always;
        add_header X-Content-Type-Options   "nosniff"      always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "payment=*, nfc=*" always;

        # ── Static asset caching (fingerprinted files) ────────
        # Vite generates assets with content-hash filenames (e.g. main.a1b2c3.js)
        location ~* \.(js|css|woff2?|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
            expires     1y;
            add_header  Cache-Control "public, immutable";
            access_log  off;
            try_files   $uri =404;
        }

        # ── Service worker (must not be cached aggressively) ──
        location = /sw.js {
            add_header  Cache-Control "no-cache, no-store, must-revalidate";
            expires     0;
        }

        # ── API proxy (optional – only if running behind same origin) ─
        # If you deploy backend separately, comment this out and use
        # VITE_API_URL in the frontend build.
        # location /api/ {
        #     proxy_pass         http://backend:3001;
        #     proxy_http_version 1.1;
        #     proxy_set_header   Upgrade    $http_upgrade;
        #     proxy_set_header   Connection "upgrade";
        #     proxy_set_header   Host       $host;
        #     proxy_cache_bypass $http_upgrade;
        # }

        # ── SPA fallback ──────────────────────────────────────
        # Any URL that doesn't match a real file falls back to index.html
        # so that React Router handles client-side navigation.
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            expires    0;
        }

        # ── Health check endpoint (used by load balancers) ───
        location = /healthz {
            access_log  off;
            add_header  Content-Type text/plain;
            return      200 "ok\n";
        }
    }
}
